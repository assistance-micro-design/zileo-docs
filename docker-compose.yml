# =============================================================================
# MCP Zileo RAG - Docker Compose
# =============================================================================

services:
  # -------------------------------------------------------------------------
  # Application principale
  # -------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-zileo-rag
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-pdf_documents}
    volumes:
      - ./data:/app/data
      - ${DOCUMENTS_PATH:-./data/documents}:/app/documents:ro
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mcp-network

  # -------------------------------------------------------------------------
  # Qdrant - Vector Database
  # -------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mcp-zileo-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"  # gRPC port
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - mcp-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  qdrant_storage:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  mcp-network:
    driver: bridge
