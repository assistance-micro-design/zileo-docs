# Golden set pour evaluation RAG offline.
#
# Calibre sur 3 documents indexes (cf. ids ci-dessous).
# Chaque entree definit:
#   - id: identifiant stable de la question
#   - query: requete utilisateur
#   - type: precise | ambigue | hors_domaine
#   - expected_doc: nom du document attendu (None pour hors_domaine)
#   - expected_pages: pages ou la reponse se trouve (vide pour hors_domaine)
#
# Metriques cibles:
#   - precise: recall@1 doit etre 1.0 (doc cible en position 1)
#   - ambigue: recall@5 doit etre 1.0 (doc cible dans top 5)
#   - hors_domaine: false_positive_rate doit etre 0.0 (aucun resultat)

documents:
  cnil:
    filename: cnil_guide_securite_personnelle.pdf
    document_id: c675a2cd-3937-4d4c-a1c4-6869517a79d5
    summary: Guide CNIL securite donnees personnelles (32p, 65 chunks)

  brochure:
    filename: Brochure Triflex ProDetail.pdf
    document_id: 4096fce0-766d-4553-a138-6e5020eccf95
    summary: Brochure produit Triflex ProDetail etancheite (12p, 23 chunks)

  metalcoat:
    filename: Triflex Metal Coat Guide systeme.pdf
    document_id: 1973b3fa-3a3b-43e5-9538-f20c0f296e56
    summary: Guide systeme Triflex Metal Coat protection metal (13p, 22 chunks)

