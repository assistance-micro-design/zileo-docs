name: Validate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: "0.9.21"
          enable-cache: true

      - name: Install dependencies (locked)
        run: uv sync --frozen --extra dev --python 3.11

      - name: Ruff lint
        run: uv run --no-sync ruff check src/ tests/

      - name: Ruff format check
        run: uv run --no-sync ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: "0.9.21"
          enable-cache: true

      - name: Install dependencies (locked)
        run: uv sync --frozen --extra dev --python 3.11

      - name: Mypy
        run: uv run --no-sync mypy src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: "0.9.21"
          enable-cache: true

      - name: Install dependencies (locked)
        run: uv sync --frozen --extra dev --python 3.11

      - name: Pytest (unit only — integration and e2e require Qdrant + Mistral)
        run: uv run --no-sync pytest tests/unit --cov=src --cov-fail-under=80
